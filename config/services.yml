services:
    _defaults:
        # automatically injects dependencies in your services
        autowire: true
        # automatically registers your services as commands, event subscribers, etc.
        autoconfigure: true
        # this means you cannot fetch services directly from the container via $container->get()
        # if you need to do this, you can override this setting on individual services
        public: false

    DemosEurope\DemosplanAddon\XBeteiligung\:
        resource: '../src/*'
        exclude:
            - '../src/{Test}'

    DemosEurope\DemosplanAddon\XBeteiligung\XBeteiligungAsyncAddon:
        lazy: true

    DemosEurope\DemosplanAddon\XBeteiligung\EventSubscriber\XBeteiligungEventSubscriber:
        tags: [ kernel.event_subscriber ]

    DemosEurope\DemosplanAddon\XBeteiligung\Logic\XBeteiligungAnySimpleTypeHandler:
        lazy: true

    DemosEurope\DemosplanAddon\XBeteiligung\Configuration\XBeteiligungConfiguration:
        factory: [ 'DemosEurope\DemosplanAddon\XBeteiligung\Configuration\XBeteiligungConfiguration', 'fromParameterBag' ]
        arguments: [ '@parameter_bag' ]

    DemosEurope\DemosplanAddon\XBeteiligung\Tools\RabbitMQMessageBroker:
        calls:
            - [ 'setClient', [ '@old_sound_rabbit_mq.demos_plan_import_rpc' ] ]
        lazy: true

    DemosEurope\DemosplanAddon\XBeteiligung\Repository\ProcedureMessageRepository:
        arguments:
            $entityClass: 'DemosEurope\DemosplanAddon\XBeteiligung\Entity\ProcedureMessage'

    DemosEurope\DemosplanAddon\XBeteiligung\Repository\XBeteiligungMessageAuditRepository:
        arguments:
            $entityClass: 'DemosEurope\DemosplanAddon\XBeteiligung\Entity\XBeteiligungMessageAudit'

    DemosEurope\DemosplanAddon\XBeteiligung\Repository\XBeteiligungFileMappingRepository:
        arguments:
            $entityClass: 'DemosEurope\DemosplanAddon\XBeteiligung\Entity\XBeteiligungFileMapping'

    DemosEurope\DemosplanAddon\XBeteiligung\Repository\XBeteiligungProcedurePhaseCockpitRepository:
        arguments:
            $entityClass: 'DemosEurope\DemosplanAddon\XBeteiligung\Entity\XBeteiligungProcedurePhaseCockpit'
