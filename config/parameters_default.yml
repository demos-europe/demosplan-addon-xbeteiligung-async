parameters:
  # Configuration for XBeteiligung connection

  # Expects the API endpoint base URL for the used xbeteiligung instance
  # Example: 172.0.0.1:9999
  addon_xbeteiligung_async_procedure_message_api_baseurl: ""
  # Auth token used for verifying the import request originated from
  # the expected Xbeteiligung instance
  addon_xbeteiligung_async_api_token: ""

  # XBeteiligung Async REST API authentication token
  addon_xbeteiligung_async_rest_authentication: ""

  # ProcedureType name to use for XBeteiligung procedure creation
  # Common values: "Allgemeine Beteiligung" (production), "Bauleitplanung" (test)
  addon_xbeteiligung_async_procedure_type_name: "Allgemeine Beteiligung"

  # String to determine which type of procedure messages should be generated.
  # For Example: Kommunal, Raumordnung or Planfeststellung
  addon_xbeteiligung_async_procedure_message_type: ""

  # Use for incoming messages from rabbitMQ
  addon_xbeteiligung_async_enable_rabbitmq_communication: false

  # Maximum time in seconds we are allowed to rabbitMQ Message Broker
  addon_xbeteiligung_async_rabbitmq_communication_delay: 300

  # Timeout for RabbitMQ requests in seconds
  addon_xbeteiligung_async_rabbitMqRequestTimeout: 30

  addon_xbeteiligung_async_rabbitMqQueueName: 'XBeteiligungAddon'

  addon_xbeteiligung_async_rabbitMqRequestIdGet: 'XBeteiligung_Get'

  addon_xbeteiligung_async_rabbitMqRequestIdSend: 'XBeteiligung_Send'

  # === XBeteiligung Message Audit Configuration ===
  # Enable/disable comprehensive message audit logging
  addon_xbeteiligung_async_enable_audit: true

  # === Direct Queue Consumption Configuration ===
  # Maximum number of messages to process per maintenance cycle
  addon_xbeteiligung_async_max_messages_per_cycle: 10

  # Consumer timeout in seconds for individual message processing
  addon_xbeteiligung_async_consumer_timeout: 5
